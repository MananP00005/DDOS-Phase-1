worker_processes 1;
worker_rlimit_nofile 1024;

events {
    worker_connections 512;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    log_format detailed
        '$remote_addr [$time_iso8601] "$request" '
        '$status $body_bytes_sent "$http_user_agent" '
        '$request_time';

    access_log /var/log/nginx/access.log detailed;
    error_log  /var/log/nginx/error.log warn;

    limit_req_zone  $binary_remote_addr zone=req_zone:10m rate=100r/s;
    limit_conn_zone $binary_remote_addr zone=conn_zone:10m;

    upstream flask_app {
        server flask:5000 max_fails=3 fail_timeout=10s;
        keepalive 32;
    }

    server {
        listen 80;
        server_name _;

        include /etc/nginx/blocked_ips.conf;

        limit_req  zone=req_zone burst=200 nodelay;
        limit_conn conn_zone 100;
        limit_req_status  503;
        limit_conn_status 503;

        location / {
            proxy_pass         http://flask_app;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   Connection        "";

            proxy_connect_timeout  5s;
            proxy_send_timeout     10s;
            proxy_read_timeout     15s;

            proxy_intercept_errors on;

            # Convert 502 and 504 into 503 — shows clean error during attack
            error_page 502 504 =503 @overloaded;
        }

        location /nginx_status {
            stub_status on;
            allow 172.20.0.0/16;
            deny  all;
        }

        # 503 from rate limit / upstream timeout / explicit return
        error_page 503 @overloaded;

        location @overloaded {
            default_type 'text/html; charset=utf-8';
            return 503 '<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>503 - Server Overloaded</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: sans-serif;
      background: #0a1628;
      color: white;
      text-align: center;
      padding: 80px 20px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .icon { font-size: 72px; margin-bottom: 20px; }
    h1 { color: #e74c3c; font-size: 2rem; margin-bottom: 16px; }
    p  { color: #94a3b8; margin-bottom: 10px; font-size: 1rem; }
    .badge {
      display: inline-block;
      background: #e74c3c;
      color: white;
      padding: 10px 28px;
      border-radius: 20px;
      font-weight: bold;
      margin-top: 24px;
      font-size: 1rem;
      letter-spacing: 0.5px;
    }
    .university {
      margin-top: 40px;
      color: #475569;
      font-size: 0.85rem;
    }
  </style>
</head>
<body>
  <div class="icon">&#9888;&#65039;</div>
  <h1>503 &mdash; Server Overloaded</h1>
  <p>The Westbrook University web server is currently under a DDoS attack.</p>
  <p>All workers are busy processing attack traffic.</p>
  <p>Please try again in a few moments.</p>
  <div class="badge">&#10007; Service Unavailable</div>
  <p class="university">Westbrook University &mdash; IT Security Lab &mdash; CS559</p>
</body>
</html>';
        }

        # 403 — blocked by ML defense
        error_page 403 @blocked;

        location @blocked {
            default_type 'text/html; charset=utf-8';
            return 403 '<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>403 - Blocked</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: sans-serif;
      background: #0a1628;
      color: white;
      text-align: center;
      padding: 80px 20px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .icon { font-size: 72px; margin-bottom: 20px; }
    h1 { color: #f97316; font-size: 2rem; margin-bottom: 16px; }
    p  { color: #94a3b8; margin-bottom: 10px; font-size: 1rem; }
    .badge {
      display: inline-block;
      background: #f97316;
      color: white;
      padding: 10px 28px;
      border-radius: 20px;
      font-weight: bold;
      margin-top: 24px;
      font-size: 1rem;
    }
    .university {
      margin-top: 40px;
      color: #475569;
      font-size: 0.85rem;
    }
  </style>
</head>
<body>
  <div class="icon">&#128683;</div>
  <h1>403 &mdash; Access Blocked</h1>
  <p>Your IP address has been blocked by the ML Defense System.</p>
  <p>Suspicious traffic pattern detected from your address.</p>
  <div class="badge">&#128274; IP Blocked</div>
  <p class="university">Westbrook University &mdash; IT Security Lab &mdash; CS559</p>
</body>
</html>';
        }
    }
}
